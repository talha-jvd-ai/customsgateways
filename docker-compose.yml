services:
  pipeline-api:
    build: ./backend
    container_name: cg-pipeline
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://hsuser:hspassword@postgres:5432/hsdb
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - upload_data:/app/uploads
      - result_data:/app/results
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: cg-postgres
    environment:
      POSTGRES_USER: hsuser
      POSTGRES_PASSWORD: hspassword
      POSTGRES_DB: hsdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hsuser -d hsdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cg-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  qdrant:
    image: qdrant/qdrant:latest
    container_name: cg-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

volumes:
  postgres_data:
  pgadmin_data:
  qdrant_data:
  upload_data:
  result_data:
